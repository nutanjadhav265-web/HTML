<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">

  <!-- Background -->
  <rect width="600" height="700" fill="#87CEEB"/>
  <circle cx="500" cy="100" r="50" fill="#FFD700"/>

  <!-- Ears -->
  <circle cx="190" cy="150" r="85" fill="#111"/>
  <circle cx="410" cy="150" r="85" fill="#111"/>

  <!-- Head -->
  <circle cx="300" cy="250" r="130" fill="#111"/>

  <!-- Face -->
  <ellipse cx="300" cy="290" rx="95" ry="105" fill="#F8D7B5"/>

  <!-- Eyes -->
  <ellipse cx="265" cy="235" rx="18" ry="38" fill="white"/>
  <ellipse cx="335" cy="235" rx="18" ry="38" fill="white"/>

  <!-- Pupils -->
  <ellipse cx="270" cy="245" rx="7" ry="14" fill="black"/>
  <ellipse cx="340" cy="245" rx="7" ry="14" fill="black"/>

  <!-- Nose -->
  <ellipse cx="300" cy="295" rx="28" ry="20" fill="black"/>

  <!-- Smile -->
  <path d="M240 330 Q300 390 360 330"
        stroke="#111"
        stroke-width="5"
        fill="none"
        stroke-linecap="round"/>

  <!-- Tongue -->
  <path d="M275 345 Q300 365 325 345"
        fill="#FF6B81"/>

  <!-- Body -->
  <ellipse cx="300" cy="500" rx="120" ry="110" fill="#111"/>

  <!-- Shorts -->
  <rect x="220" y="460" width="160" height="90" rx="15" fill="#E53935"/>

  <!-- Buttons -->
  <circle cx="260" cy="505" r="12" fill="white"/>
  <circle cx="340" cy="505" r="12" fill="white"/>

  <!-- Arms -->
  <path d="M190 460 Q130 420 90 360"
        stroke="#111"
        stroke-width="14"
        fill="none"/>

  <path d="M410 460 Q470 420 510 360"
        stroke="#111"
        stroke-width="14"
        fill="none"/>

  <!-- Gloves -->
  <circle cx="80" cy="350" r="25" fill="white"/>
  <circle cx="520" cy="350" r="25" fill="white"/>

  <!-- Legs -->
  <line x1="260" y1="600" x2="235" y2="660"
        stroke="#111"
        stroke-width="14"/>
  <line x1="340" y1="600" x2="365" y2="660"
        stroke="#111"
        stroke-width="14"/>

  <!-- Shoes -->
  <ellipse cx="220" cy="670" rx="45" ry="22" fill="#FFD54F"/>
  <ellipse cx="380" cy="670" rx="45" ry="22" fill="#FFD54F"/>

</svg>
</body>
</html>
